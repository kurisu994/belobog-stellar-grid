<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BSG Export — Worker 示例</title>
  </head>
  <body>
    <div class="app">
      <h1>🚀 BSG Export — Worker 示例</h1>

      <div id="message" style="display: none"></div>

      <section class="section">
        <h2>⚡ ExportWorker 类演示</h2>
        <p class="desc">
          使用 @bsg-export/worker 的 ExportWorker 类，在 Web Worker
          中执行导出操作
        </p>

        <table id="demo-table">
          <thead>
            <tr>
              <th>姓名</th>
              <th>年龄</th>
              <th>城市</th>
              <th>邮箱</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>张三</td>
              <td>28</td>
              <td>北京</td>
              <td>zhang@example.com</td>
            </tr>
            <tr>
              <td>李四</td>
              <td>32</td>
              <td>上海</td>
              <td>li@example.com</td>
            </tr>
            <tr>
              <td>王五</td>
              <td>25</td>
              <td>广州</td>
              <td>wang@example.com</td>
            </tr>
            <tr>
              <td>赵六</td>
              <td>30</td>
              <td>深圳</td>
              <td>zhao@example.com</td>
            </tr>
            <tr>
              <td>钱七</td>
              <td>27</td>
              <td>杭州</td>
              <td>qian@example.com</td>
            </tr>
          </tbody>
        </table>

        <div class="actions">
          <button id="export-csv" disabled>Worker 导出 CSV</button>
          <button id="export-xlsx" disabled>Worker 导出 Excel</button>
          <button id="generate-bytes" disabled>生成字节（不下载）</button>
        </div>
        <div id="progress"></div>
      </section>

      <footer>
        <p id="status">⏳ 初始化中...</p>
      </footer>
    </div>
  </body>
</html>
